<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">
    <link rel="stylesheet" href="{{ '/styles/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>
    <!-- Decorative background elements -->
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>

    {% include nav.html %}

    <main>
        {% include hero.html %}
        {% include events.html %}
        {% include about.html %}
        {% include gallery.html %}
        {% include contact.html %}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <h3 data-i18n="footerTitle">Le 3 Cordes</h3>
                    <p data-i18n="footerSubtitle">ASBL Culturelle</p>
                </div>
                <div class="footer-links">
                    <a href="#accueil" data-i18n="navHome">Accueil</a>
                    <a href="#evenements" data-i18n="navEvents">Événements</a>
                    <a href="#apropos" data-i18n="navAbout">À Propos</a>
                    <a href="#contact" data-i18n="navContact">Contact</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p data-i18n="footerCopyright">&copy; 2026 Le 3 Cordes ASBL. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <!-- Facebook SDK -->
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous"
            src="https://connect.facebook.net/fr_FR/sdk.js#xfbml=1&version=v19.0">
    </script>

    <script src="{{ '/scripts/translations.js' | relative_url }}"></script>
    <script src="{{ '/scripts/main.js' | relative_url }}"></script>
</body>
</html>
